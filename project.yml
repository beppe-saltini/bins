name: BinsApp
options:
  bundleIdPrefix: com.beppe
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5"
schemes:
  BinsApp:
    build:
      targets:
        BinsApp: all
        BinsWidget: all
    run:
      config: Debug
targets:
  BinsApp:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
      - path: Resources/PrivacyInfo.xcprivacy
      - path: Resources
        buildPhase: resources
        excludes:
          - "*.py"
          - "Assets.xcassets"
          - "PrivacyInfo.xcprivacy"
          - ".icon-cache"
    entitlements:
      path: BinsApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.MCZH73T4Z2.bins
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_ENABLE_CFBUNDLEICONS_MERGE: "NO"
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: MCZH73T4Z2
      TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: BinsWidget
        embed: true
        codeSign: true
    postBuildScripts:
      - name: Use production GreenBin as primary icon
        script: |
          PLIST="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons:CFBundlePrimaryIcon" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string GreenBin" "$PLIST"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Bins
        UIApplicationSupportsAlternateIcons: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.beppe.BinsApp.refresh
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - GreenBin
          CFBundleAlternateIcons:
            BlackBin:
              CFBundleIconFiles:
                - BlackBin
        CFBundleShortVersionString: "1.0.2"
        CFBundleVersion: "13"
  BinsWidget:
    type: app-extension
    platform: iOS
    sources:
      - WidgetSources
      - path: Resources/PrivacyInfo.xcprivacy
    entitlements:
      path: BinsWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.MCZH73T4Z2.bins
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.beppe.BinsApp.BinsWidget
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: MCZH73T4Z2
      CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
      TARGETED_DEVICE_FAMILY: "1"
    info:
      path: BinsWidget-Info.plist
      properties:
        CFBundleDisplayName: BinsWidget
        CFBundleShortVersionString: "1.0.2"
        CFBundleVersion: "13"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
