name: BinsApp
options:
  bundleIdPrefix: com.beppe
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5"
targets:
  BinsApp:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
        excludes:
          - "*.py"
    entitlements:
      path: BinsApp.entitlements
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: MCZH73T4Z2
    dependencies:
      - target: BinsWidget
        embed: true
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Bins
        UILaunchScreen: {}
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.beppe.BinsApp.refresh
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - GreenBin
          CFBundleAlternateIcons:
            BlackBin:
              CFBundleIconFiles:
                - BlackBin
  BinsWidget:
    type: app-extension
    platform: iOS
    sources:
      - WidgetSources
    entitlements:
      path: BinsWidget.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.beppe.BinsApp.BinsWidget
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: MCZH73T4Z2
    info:
      path: BinsWidget-Info.plist
      properties:
        CFBundleDisplayName: BinsWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
